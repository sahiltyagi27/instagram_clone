services:
  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - "./init-scripts:/etc/localstack/init/ready.d"

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      AWS_REGION: us-east-1
      S3_BUCKET: instagram-media
      S3_ENDPOINT: http://localstack:4566
    depends_on:
      - localstack

